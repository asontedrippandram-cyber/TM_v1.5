      background: var(--bg-primary);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .progress-bar-fill.blue { background: var(--accent-blue); }
    .progress-bar-fill.purple { background: var(--accent-purple); }

    .progress-cases {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .progress-hint {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 6px;
      font-style: italic;
    }

    .progress-formula {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 6px;
      text-align: center;
    }

    .progress-slider-group {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }

    .progress-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 8px;
      background: var(--bg-primary);
      border-radius: 4px;
      outline: none;
    }

    .progress-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--accent-blue);
      border-radius: 50%;
      cursor: pointer;
    }

    .progress-remark {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-primary);
      padding: 10px;
      font-family: inherit;
      font-size: 13px;
    }

    .progress-remark:focus {
      outline: none;
      border-color: var(--accent-blue);
    }

    .footer {
      text-align: center;
      padding: 12px;
      color: var(--text-secondary);
      font-size: 11px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
    }

    [data-tooltip] {
      position: relative;
    }

    [data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      padding: 4px 8px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      z-index: 10;
    }

    @media (max-width: 992px) {
      .content-main {
        flex-direction: column;
      }

      .dimensions-panel, .test-panel {
        min-width: 100%;
      }

      .timeline-section {
        flex-direction: column;
        align-items: stretch;
      }

      .timeline-overview {
        min-width: 100%;
      }

      .feature-tabs {
        overflow-x: auto;
        padding-bottom: 8px;
      }

      .sub-feature-grid {
        grid-template-columns: 1fr;
      }

      .filter-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .filter-group {
        width: 100%;
      }

      .filter-search {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-title">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      <h1>车载软件测试进度看板</h1>
    </div>
    <div class="project-selector">
      <span>项目:</span>
      <select id="projectSelect"></select>
      <input type="file" id="csvFileInput" accept=".csv" style="display:none" onchange="handleCSVFileSelect(event)">
      <button class="btn btn-ghost" onclick="triggerCSVImport()" title="导入用例进度(CVS)">导入用例</button>
    </div>
  </header>

  <main class="main-container">
    <section class="risk-section">
      <div class="risk-section-header">
        <span class="risk-section-title">车型风险概览</span>
        <div class="risk-summary" id="riskSummary"></div>
      </div>
      <div class="brand-tabs" id="brandTabs"></div>
      <div class="risk-cards" id="riskCards">
        <div class="no-vehicle-hint">加载中...</div>
      </div>
    </section>

    <section class="timeline-section" id="timelineSection" style="display:none;">
      <div class="timeline-overview" id="timelineOverview"></div>
      <div class="feature-tabs" id="featureTabs"></div>
      <div class="breadcrumb" id="breadcrumb"></div>
    </section>

    <div class="content-area">
      <div class="content-main" id="contentMain">
        <div class="no-dimension">
          <svg class="no-dimension-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18"/>
            <path d="M9 21V9"/>
          </svg>
          <p>点击上方风险卡片选择车型</p>
          <p style="font-size:12px;margin-top:8px;">查看五维度进度和测试用例详情</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Test Case Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">新增测试用例</h3>
        <button class="modal-close" onclick="closeModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="testForm">
          <input type="hidden" id="editId">

          <div class="form-group">
            <label class="form-label required">用例标题</label>
            <input type="text" class="form-input" id="testTitle" required placeholder="输入测试用例名称">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">特性</label>
              <select class="form-select" id="testFeature" required>
                <option value="">选择特性</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label required">子特性</label>
              <select class="form-select" id="testSubFeature" required disabled>
                <option value="">先选特性</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">优先级</label>
              <select class="form-select" id="testPriority" required>
                <option value="">选择优先级</option>
                <option value="high">高</option>
                <option value="medium">中</option>
                <option value="low">低</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">备注说明</label>
            <textarea class="form-textarea" id="testRemark" placeholder="可选填写备注信息"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveTestCase()">保存</button>
      </div>
    </div>
  </div>

  <!-- Progress Edit Modal -->
  <div class="modal-overlay" id="progressModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="progressModalTitle">编辑进度</h3>
        <button class="modal-close" onclick="closeProgressModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editProgressSubVehicle">
        <input type="hidden" id="editProgressSubFeature">
        <input type="hidden" id="editProgressDimension">

        <!-- 用例执行进度 (只读) -->
        <div class="progress-section">
          <div class="progress-section-header">
            <span class="progress-section-title">用例执行进度</span>
            <span class="progress-section-percent blue" id="caseProgressValue">0%</span>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar-fill blue" id="caseProgressBar" style="width: 0%"></div>
          </div>
          <div class="progress-cases">
            <span>通过 / 总用例:</span>
            <span id="caseCases">0 / 0</span>
          </div>
          <div class="progress-hint">用例进度通过 CSV 导入更新</div>
        </div>

        <!-- 手工任务执行进度 -->
        <div class="progress-section">
          <div class="progress-section-header">
            <span class="progress-section-title">手工任务进度</span>
            <span class="progress-section-percent" id="manualProgressValue">0%</span>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar-fill" id="manualProgressBar" style="width: 0%"></div>
          </div>
          <div class="form-group">
            <div class="progress-slider-group">
              <input type="range" class="progress-slider" id="manualProgressSlider" min="0" max="100" value="0" oninput="updateManualProgress(this.value)">
            </div>
          </div>
        </div>

        <!-- 手工任务说明 -->
        <div class="form-group">
          <label class="form-label">手工任务说明</label>
          <textarea class="form-textarea progress-remark" id="manualRemark" placeholder="填写手工任务进展说明..."></textarea>
        </div>

        <!-- 综合进度 -->
        <div class="progress-section overall">
          <div class="progress-section-header">
            <span class="progress-section-title">综合进度</span>
            <span class="progress-section-percent purple" id="overallProgressValue">0%</span>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar-fill purple" id="overallProgressBar" style="width: 0%"></div>
          </div>
          <div class="progress-formula">综合进度 = 用例进度 × 50% + 手工进度 × 50%</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeProgressModal()">取消</button>
        <button class="btn btn-primary" onclick="saveProgress()">保存</button>
      </div>
    </div>
  </div>

  <div class="footer">
    车载软件测试进度看板 v5.0
  </div>

  <script>
    // ========== API 配置 ==========
    const API_BASE = window.location.origin;

    async function apiGet(path) {
      const res = await fetch(API_BASE + path);
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      return res.json();
    }

    async function apiPut(path, data) {
      const res = await fetch(API_BASE + path, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      return res.json();
    }

    async function apiPost(path, data) {
      const res = await fetch(API_BASE + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      return res.json();
    }

    async function apiPostForm(path, formData) {
      const res = await fetch(API_BASE + path, {
        method: 'POST',
        body: formData
      });
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      return res.json();
    }

    // ========== 全局变量 ==========
    let currentProjectId = null;
    let projectData = null;
    let testCases = [];
    let caseProgressData = {}; // 用例进度数据 (from CSV): "subVehicleId-subFeatureId-dimension": {passed, total}
    let selectedBrandId = null;
    let selectedSubVehicleId = null;
    let selectedSubFeatureId = null;
    let selectedFeatureId = null;
    let selectedDimensionKey = null;
    let filterStatus = 'all';
    let filterAssignee = 'all';
    let filterPriority = 'all';
    let searchText = '';

    // ========== API 数据存取 ==========
    async function loadCaseProgressData() {
      try {
        const data = await apiGet('/api/case-progress');
        caseProgressData = {};
        for (const item of data.items || []) {
          const key = `${item.subVehicleId}-${item.subFeatureId}-${item.dimension}`;
          caseProgressData[key] = {
            passed: item.passedCases,
            total: item.totalCases,
            progress: item.totalCases > 0 ? Math.round((item.passedCases / item.totalCases) * 100) : 0
          };
        }
      } catch (e) {
        console.warn('Failed to load case progress from API, using empty data:', e);
        caseProgressData = {};
      }
    }

    async function saveCaseProgressData() {
      const items = [];
      for (const [key, value] of Object.entries(caseProgressData)) {
        const [subVehicleId, subFeatureId, dimension] = key.split('-');
        items.push({ subVehicleId, subFeatureId, dimension, passedCases: value.passed, totalCases: value.total });
      }
      try {
        await apiPut('/api/case-progress', { items });
      } catch (e) {
        console.warn('Failed to save case progress to API:', e);
      }
    }

    async function loadProjectsFromServer() {
      try {
        const data = await apiGet('/api/projects');
        const pd = {};
        for (const item of data.items || []) {
          pd[item.projectId] = item.data;
        }
        return pd;
      } catch (e) {
        console.warn('Failed to load projects from API:', e);
        return null;
      }
    }

    async function saveProjectsToServer() {
      const items = [];
      for (const [projectId, data] of Object.entries(projectData || {})) {
        items.push({ projectId, data });
      }
      try {
        await apiPut('/api/projects', { items });
      } catch (e) {
        console.warn('Failed to save projects to API:', e);
      }
    }

    // ========== CSV 导入用例进度 ==========
    async function importCaseProgressFromCSV(csvText) {
      const lines = csvText.trim().split('\n');
      if (lines.length < 2) return;

      const headers = lines[0].split(',').map(h => h.trim());
      const subVehicleIdIdx = headers.indexOf('subVehicleId');
      const subFeatureIdIdx = headers.indexOf('subFeatureId');
      const dimensionIdx = headers.indexOf('dimension');
      const passedIdx = headers.indexOf('passedCases');
      const totalIdx = headers.indexOf('totalCases');

      if (subVehicleIdIdx === -1 || subFeatureIdIdx === -1 || dimensionIdx === -1 || passedIdx === -1 || totalIdx === -1) {
        alert('CSV 格式错误，请检查列名');
        return;
      }

      caseProgressData = {};
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',').map(c => c.trim());
        const subVehicleId = cols[subVehicleIdIdx];
        const subFeatureId = cols[subFeatureIdIdx];
        const dimension = cols[dimensionIdx];
        const passed = parseInt(cols[passedIdx]) || 0;
        const total = parseInt(cols[totalIdx]) || 0;

        const key = `${subVehicleId}-${subFeatureId}-${dimension}`;
        caseProgressData[key] = { passed, total, progress: total > 0 ? Math.round((passed / total) * 100) : 0 };
      }

      await saveCaseProgressData();
      alert('用例进度导入成功！');
      loadProject();
    }

    function triggerCSVImport() {
      document.getElementById('csvFileInput').click();
    }

    function handleCSVFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        importCaseProgressFromCSV(e.target.result);
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // ========== 初始化 ==========
    async function init() {
      if (typeof CONFIG === 'undefined') {
        alert('配置文件 config.js 未加载，请确保与 index1.html 同目录');
        return;
      }

      await loadProjectList();
      setupEventListeners();
      await initData();
    }

    // ========== 数据初始化 ==========
    async function initData() {
      const serverData = await loadProjectsFromServer();
      if (serverData && Object.keys(serverData).length > 0) {
        projectData = serverData;
      } else {
        projectData = buildProjectDataFromConfig();
        await saveData();
      }

      await loadCaseProgressData();

      const projectIds = Object.keys(projectData);
      if (projectIds.length > 0) {
        currentProjectId = projectIds[0];
        document.getElementById('projectSelect').value = currentProjectId;
        loadProject();
      }
    }

    function buildProjectDataFromConfig() {
      const data = {};
      data[CONFIG.project.id] = {
        id: CONFIG.project.id,
        name: CONFIG.project.name,
        features: CONFIG.features,
        vehicles: CONFIG.vehicles,
        featureDimensions: CONFIG.featureDimensions || {},
        testCases: CONFIG.testCases || []
      };
      return data;
    }

    async function saveData() {
      await saveProjectsToServer();
    }

    // ========== 项目列表 ==========
    async function loadProjectList() {
      const select = document.getElementById('projectSelect');
      const serverData = await loadProjectsFromServer();
      const data = serverData && Object.keys(serverData).length > 0 ? serverData : buildProjectDataFromConfig();

      Object.keys(data).forEach(key => {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = data[key].name;
        select.appendChild(opt);
      });
      select.addEventListener('change', function() {
        currentProjectId = this.value;
        selectedBrandId = null;
        selectedSubVehicleId = null;
        selectedSubFeatureId = null;
        selectedFeatureId = null;
        filterStatus = 'all';
        filterAssignee = 'all';
        filterPriority = 'all';
        searchText = '';
        loadProject();
      });
    }

    // ========== 加载项目 ==========
    function loadProject() {
      if (!currentProjectId || !projectData[currentProjectId]) return;
      testCases = projectData[currentProjectId].testCases || [];
      selectedBrandId = null;
      selectedSubVehicleId = null;
      selectedSubFeatureId = null;
      selectedFeatureId = null;
      filterStatus = 'all';
      filterAssignee = 'all';
      filterPriority = 'all';
      searchText = '';
      renderRiskSummary();
      renderRiskCards();
      renderTimelineSection();
      renderContent();
    }

    function selectFeature(featureId) {
      selectedFeatureId = featureId;
      selectedSubFeatureId = null;
      renderTimelineSection();
      renderContent();
    }

    // ========== 计算单个维度的用例统计进度 ==========
    function getDimCaseProgress(subVehicleId, subFeatureId, dimKey) {
      const key = `${subVehicleId}-${subFeatureId}-${dimKey}`;
      const data = caseProgressData[key];
      if (!data) return { passed: 0, total: 0, progress: 0 };
      return data;
    }

    // ========== 计算子车型+子特性的总体用例统计 ==========
    function getCaseStatsForSubFeature(subVehicleId, subFeatureId) {
      let totalPassed = 0;
      let totalCases = 0;
      CONFIG.dimensions.forEach(dim => {
        const key = `${subVehicleId}-${subFeatureId}-${dim.key}`;
        const data = caseProgressData[key];
        if (data) {
          totalPassed += data.passed;
          totalCases += data.total;
        }
      });
      return {
        passed: totalPassed,
        total: totalCases,
        progress: totalCases > 0 ? Math.round((totalPassed / totalCases) * 100) : 0
      };
    }

    // ========== 获取维度综合进度 (用例50% + 手工50%) ==========
    function getDimOverallProgress(subVehicleId, subFeatureId, dimKey) {
      const caseData = getDimCaseProgress(subVehicleId, subFeatureId, dimKey);
      const featureDims = projectData[currentProjectId].featureDimensions || {};
      const key = `${subVehicleId}-${subFeatureId}`;
      const dimData = (featureDims[key] && featureDims[key][dimKey]) || {};

      const caseProgress = caseData.progress || 0;
      const manualProgress = dimData.manualProgress || 0;

      // 综合进度 = 用例50% + 手工50%
      return Math.round(caseProgress * 0.5 + manualProgress * 0.5);
    }

    // ========== 计算子特性整体进度 ==========
    function getSubFeatureProgress(subVehicleId, subFeatureId) {
      const dims = CONFIG.dimensions;
      const progresses = [];

      dims.forEach(dim => {
        const overall = getDimOverallProgress(subVehicleId, subFeatureId, dim.key);
        progresses.push(overall);
      });

      if (progresses.length === 0) return 0;

      // 返回所有维度的平均进度
      const sum = progresses.reduce((a, b) => a + b, 0);
      return Math.round(sum / progresses.length);
    }

    // ========== 风险计算 ==========
    function calculateRisk(subVehicle) {
      const today = new Date();
      const todayStr = `${today.getFullYear()}${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}`;
      const commercialDate = subVehicle.milestones?.commercial;

      if (!commercialDate) return { level: 'low', daysLeft: 999, progress: 0, failedCases: 0, blockedCases: 0, pendingCases: 0 };

      const daysLeft = Math.max(0, parseInt(commercialDate) - parseInt(todayStr));

      const project = projectData[currentProjectId];

      // 计算该车型下所有子特性的进度
      let totalProgress = 0;
      let sfCount = 0;
      let failedCases = 0;
      let blockedCases = 0;
      let pendingCases = 0;

      const features = getFeaturesForSubVehicle(subVehicle.id);
      features.forEach(f => {
        f.subFeatures.forEach(sf => {
          const progress = getSubFeatureProgress(subVehicle.id, sf.id);
          totalProgress += progress;
          sfCount++;

          // 统计用例状态
          const cases = testCases.filter(tc => tc.subVehicleId === subVehicle.id && tc.featureId === sf.id);
          cases.forEach(tc => {
            Object.values(tc.dimensionResults || {}).forEach(result => {
              if (result.status === 'failed') failedCases++;
              else if (result.status === 'blocked') blockedCases++;
              else if (result.status === 'pending' || result.status === null) pendingCases++;
            });
          });
        });
      });

      const progress = sfCount > 0 ? Math.round(totalProgress / sfCount) : 0;

      const totalDays = 180;
      const distanceFactor = Math.max(0, 1 - daysLeft / totalDays);
      const completionFactor = (failedCases + blockedCases) / Math.max(1, testCases.filter(tc => tc.subVehicleId === subVehicle.id).length * 5);
      const riskValue = distanceFactor * completionFactor;

      let level = 'low';
      if (riskValue > 0.6 || (failedCases > 0 && progress < 50)) level = 'high';
      else if (riskValue > 0.3 || blockedCases > 0) level = 'medium';

      return { level, daysLeft, progress, failedCases, blockedCases, pendingCases };
    }

    // ========== 渲染品牌Tab ==========
    function renderBrandTabs() {
      const tabsContainer = document.getElementById('brandTabs');
      const project = projectData[currentProjectId];
      if (!project) return;

      const brandStats = project.vehicles.map(v => {
        const high = v.subVehicles.filter(sv => calculateRisk(sv).level === 'high').length;
        const medium = v.subVehicles.filter(sv => calculateRisk(sv).level === 'medium').length;
        const low = v.subVehicles.filter(sv => calculateRisk(sv).level === 'low').length;
        return { id: v.id, name: v.name, count: v.subVehicles.length, high, medium, low };
      });

      let tabsHtml = `
        <button class="brand-tab ${selectedBrandId === null ? 'active' : ''}" onclick="selectBrand(null)">
          全部
          <span class="brand-tab-count">${project.vehicles.reduce((sum, v) => sum + v.subVehicles.length, 0)}</span>
        </button>
      `;

      brandStats.forEach(b => {
        tabsHtml += `
          <button class="brand-tab ${selectedBrandId === b.id ? 'active' : ''}" onclick="selectBrand('${b.id}')">
            ${b.name}
            <span class="brand-tab-count">${b.count}</span>
          </button>
        `;
      });

      tabsContainer.innerHTML = tabsHtml;
    }

    // ========== 渲染风险汇总 ==========
    function renderRiskSummary() {
      const container = document.getElementById('riskSummary');
      const project = projectData[currentProjectId];
      if (!project) return;

      let high = 0, medium = 0, low = 0;
      project.vehicles.forEach(v => {
        v.subVehicles.forEach(sv => {
          const risk = calculateRisk(sv);
          if (risk.level === 'high') high++;
          else if (risk.level === 'medium') medium++;
          else low++;
        });
      });

      container.innerHTML = `
        <div class="risk-summary-item"><span class="risk-summary-dot high"></span>高风险 ${high}</div>
        <div class="risk-summary-item"><span class="risk-summary-dot medium"></span>中风险 ${medium}</div>
        <div class="risk-summary-item"><span class="risk-summary-dot low"></span>低风险 ${low}</div>
      `;
    }

    // ========== 渲染风险卡片 ==========
    function renderRiskCards() {
      const container = document.getElementById('riskCards');
      const project = projectData[currentProjectId];
      if (!project) return;

      renderBrandTabs();

      const vehiclesToShow = selectedBrandId
        ? project.vehicles.filter(v => v.id === selectedBrandId)
        : project.vehicles;

      const allSubVehicles = [];
      vehiclesToShow.forEach(v => {
        v.subVehicles.forEach(sv => {
          const risk = calculateRisk(sv);
          allSubVehicles.push({
            vehicleName: v.name,
            subVehicleName: sv.name,
            id: sv.id,
            ...risk
          });
        });
      });

      const order = { high: 0, medium: 1, low: 2 };
      allSubVehicles.sort((a, b) => order[a.level] - order[b.level]);

      if (allSubVehicles.length === 0) {
        container.innerHTML = '<div class="no-vehicle-hint">暂无车型数据</div>';
        return;
      }

      container.innerHTML = allSubVehicles.map(sv => `
        <div class="risk-card ${sv.level} ${selectedSubVehicleId === sv.id ? 'selected' : ''}"
             onclick="selectSubVehicle('${sv.id}')">
          <div class="risk-card-header">
            <div class="risk-card-name">${sv.vehicleName} ${sv.subVehicleName}</div>
            <div class="risk-card-badge">${sv.level === 'high' ? '高' : sv.level === 'medium' ? '中' : '低'}</div>
          </div>
          <div class="risk-card-progress">
            <div class="risk-card-progress-fill" style="width: ${sv.progress}%"></div>
          </div>
          <div class="risk-card-main">
            <div class="risk-card-percent">${sv.progress}%</div>
            <div class="risk-card-days">距商用 <span>${sv.daysLeft}</span>天</div>
          </div>
          <div class="risk-card-stats">
            ${sv.failedCases > 0 ? `<span class="risk-card-stat failed">● 失败 ${sv.failedCases}</span>` : ''}
            ${sv.blockedCases > 0 ? `<span class="risk-card-stat blocked">● 阻塞 ${sv.blockedCases}</span>` : ''}
            ${sv.pendingCases > 0 ? `<span class="risk-card-stat pending">○ 待测 ${sv.pendingCases}</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    function selectBrand(brandId) {
      if (!projectData || !projectData[currentProjectId]) return;
      selectedBrandId = brandId;
      if (brandId && selectedSubVehicleId) {
        const vehicle = projectData[currentProjectId].vehicles.find(v => v.id === brandId);
        if (vehicle && !vehicle.subVehicles.some(sv => sv.id === selectedSubVehicleId)) {
          selectedSubVehicleId = null;
          selectedSubFeatureId = null;
        }
      }
      renderRiskCards();
      renderTimelineSection();
      renderContent();
    }

    function selectSubVehicle(subVehicleId) {
      selectedSubVehicleId = subVehicleId;
      selectedSubFeatureId = null;
      filterStatus = 'all';
      filterAssignee = 'all';
      filterPriority = 'all';
      searchText = '';
      renderRiskCards();
      renderTimelineSection();
      renderContent();
    }

    // ========== 渲染时间线区域 ==========
    function renderTimelineSection() {
      const section = document.getElementById('timelineSection');
      const timelineOverview = document.getElementById('timelineOverview');
      const featureTabs = document.getElementById('featureTabs');
      const breadcrumb = document.getElementById('breadcrumb');

      if (!selectedSubVehicleId) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'flex';

      const result = getSubVehicle(selectedSubVehicleId);
      if (!result) return;

      const { subVehicle, vehicle } = result;

      const today = new Date();
      const todayStr = `${today.getFullYear()}${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}`;
      const milestones = subVehicle.milestones || {};
      const commercialDate = milestones.commercial || CONFIG.project.defaultCommercial;
      const daysLeft = Math.max(0, parseInt(commercialDate) - parseInt(todayStr));
      const startDate = CONFIG.project.startDate;
      const totalDays = parseInt(commercialDate) - parseInt(startDate);
      const daysPassed = Math.max(0, parseInt(todayStr) - parseInt(startDate));
      const timelinePercent = Math.min(100, Math.max(0, (daysPassed / totalDays) * 100));

      // 构建多里程碑HTML
      const milestoneKeys = ['epRelease', 'ppRelease', 'commercial'];
      const milestoneNames = { epRelease: 'EP', ppRelease: 'PP', commercial: '商用' };
      let markersHtml = '';
      let nextMilestoneKey = null;
      let nextMilestoneDays = 0;
      milestoneKeys.forEach(key => {
        const date = milestones[key];
        if (date) {
          const pos = Math.min(100, Math.max(0, ((parseInt(date) - parseInt(startDate)) / totalDays) * 100));
          const isPast = parseInt(date) < parseInt(todayStr);
          markersHtml += `<div class="timeline-marker ${isPast ? 'past' : ''}" style="left: ${pos}%" title="${milestoneNames[key]}: ${date}"></div>`;
          markersHtml += `<div class="timeline-marker-label ${isPast ? 'past' : 'future'}" style="left: ${pos}%">${milestoneNames[key]}</div>`;
          // 找到下一个未到期的里程碑
          if (!isPast && !nextMilestoneKey) {
            nextMilestoneKey = key;
            nextMilestoneDays = Math.max(0, parseInt(date) - parseInt(todayStr));
          }
        }
      });

      // 格式化当前日期
      const todayDisplay = `${today.getFullYear()}/${String(today.getMonth() + 1).padStart(2, '0')}/${String(today.getDate()).padStart(2, '0')}`;

      timelineOverview.innerHTML = `
        <div class="timeline-mini">
          <div class="timeline-mini-header">
            <div class="timeline-mini-title-row">
              <span class="timeline-mini-title">${vehicle.name} ${subVehicle.name}</span>
              <span class="timeline-mini-today">${todayDisplay}</span>
            </div>
          </div>
          <div class="timeline-mini-bar">
            <div class="timeline-mini-progress" style="width: ${timelinePercent}%"></div>
            <div class="timeline-mini-marker" style="left: ${timelinePercent}%"></div>
            ${markersHtml}
            <div class="timeline-mini-end"></div>
          </div>
          <div class="timeline-mini-footer">
            <div class="timeline-mini-stats">
              <div class="timeline-stat-item">
                <span class="timeline-stat-label">距商用</span>
                <span class="timeline-stat-value red">${daysLeft}天</span>
              </div>
              ${nextMilestoneKey && nextMilestoneKey !== 'commercial' ? `
              <div class="timeline-stat-item">
                <span class="timeline-stat-label">距${milestoneNames[nextMilestoneKey]}</span>
                <span class="timeline-stat-value">${nextMilestoneDays}天</span>
              </div>
              ` : ''}
            </div>
          </div>
          <div class="timeline-milestones">
            ${milestoneKeys.filter(key => milestones[key]).map(key => `
              <div class="timeline-milestone-item ${parseInt(milestones[key]) < parseInt(todayStr) ? 'past' : ''}">
                <span class="timeline-milestone-name">${milestoneNames[key]}</span>
                <span class="timeline-milestone-date">${milestones[key]}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      const project = projectData[currentProjectId];
      const features = getFeaturesForSubVehicle(selectedSubVehicleId);
      let tabsHtml = `<button class="feature-tab ${!selectedFeatureId ? 'active' : ''}" onclick="selectFeature(null)">全部</button>`;
      features.forEach(f => {
        const isActive = selectedFeatureId === f.id && !selectedSubFeatureId;
        tabsHtml += `
          <div class="feature-tab-dropdown" tabindex="0">
            <button class="feature-tab ${isActive ? 'active' : ''}" onclick="selectFeature('${f.id}')">${f.name}</button>
            <div class="feature-tab-dropdown-content">
              ${f.subFeatures.map(sf => `
                <div class="feature-tab-dropdown-item ${selectedFeatureId === f.id && selectedSubFeatureId === sf.id ? 'active' : ''}" onclick="selectSubFeatureDirect('${sf.id}', '${f.id}')">${sf.name}</div>
              `).join('')}
            </div>
          </div>
        `;
      });
      featureTabs.innerHTML = tabsHtml;

      let breadcrumbHtml = `<span class="breadcrumb-item" onclick="clearSelectedSubFeature()">${vehicle.name} ${subVehicle.name}</span>`;
      if (selectedFeatureId) {
        const feature = features.find(f => f.id === selectedFeatureId);
        if (feature) {
          breadcrumbHtml += `<span class="breadcrumb-sep">/</span>`;
          if (selectedSubFeatureId) {
            breadcrumbHtml += `<span class="breadcrumb-item" onclick="clearSelectedSubFeature()">${feature.name}</span>`;
            breadcrumbHtml += `<span class="breadcrumb-sep">/</span>`;
            breadcrumbHtml += `<span class="breadcrumb-current">${getSubFeatureName(selectedSubFeatureId)}</span>`;
          } else {
            breadcrumbHtml += `<span class="breadcrumb-current">${feature.name}</span>`;
          }
        }
      } else if (selectedSubFeatureId) {
        breadcrumbHtml = `<span class="breadcrumb-item" onclick="clearSelectedSubFeature()">${vehicle.name} ${subVehicle.name}</span>`;
        breadcrumbHtml += `<span class="breadcrumb-sep">/</span>`;
        breadcrumbHtml += `<span class="breadcrumb-current">${getSubFeatureName(selectedSubFeatureId)}</span>`;
      }
      breadcrumb.innerHTML = breadcrumbHtml;
    }

    function getSubVehicle(subVehicleId) {
      const project = projectData[currentProjectId];
      if (!project) return null;
      for (const v of project.vehicles) {
        const sv = v.subVehicles.find(s => s.id === subVehicleId);
        if (sv) return { subVehicle: sv, vehicle: v };
      }
      return null;
    }

    // 获取子车型的特性列表（优先使用车型独立定义，否则使用公共定义）
    function getFeaturesForSubVehicle(subVehicleId) {
      const result = getSubVehicle(subVehicleId);
      if (!result) return CONFIG.features;
      // 如果子车型有自己的features定义，使用它；否则使用公共的CONFIG.features
      return result.subVehicle.features || CONFIG.features;
    }

    // ========== 渲染主内容区 ==========
    function renderContent() {
      const container = document.getElementById('contentMain');

      if (!selectedSubVehicleId) {
        container.innerHTML = `
          <div class="no-dimension">
            <svg class="no-dimension-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M3 9h18"/>
              <path d="M9 21V9"/>
            </svg>
            <p>点击上方风险卡片选择车型</p>
            <p style="font-size:12px;margin-top:8px;">查看五维度进度和测试用例详情</p>
          </div>
        `;
        return;
      }

      const result = getSubVehicle(selectedSubVehicleId);
      if (!result) return;

      const { subVehicle, vehicle } = result;
      const project = projectData[currentProjectId];

      // 统计该车型下所有用例
      const allSvCases = testCases.filter(tc => tc.subVehicleId === selectedSubVehicleId);
      const totalCases = allSvCases.length;

      // 统计各状态
      let passedCount = 0, failedCount = 0, blockedCount = 0, pendingCount = 0;
      allSvCases.forEach(tc => {
        Object.values(tc.dimensionResults || {}).forEach(result => {
          if (result.status === 'passed') passedCount++;
          else if (result.status === 'failed') failedCount++;
          else if (result.status === 'blocked') blockedCount++;
          else if (result.status === 'pending' || result.status === null) pendingCount++;
        });
      });

      if (!selectedSubFeatureId) {
        const features = getFeaturesForSubVehicle(selectedSubVehicleId);
        const featuresToShow = selectedFeatureId
          ? features.filter(f => f.id === selectedFeatureId)
          : features;

        let statsHtml = `
          <div class="stats-mini">
            <div class="stat-mini">
              <div class="stat-mini-value">${totalCases}</div>
              <div class="stat-mini-label">总用例</div>
            </div>
            <div class="stat-mini">
              <div class="stat-mini-value green">${passedCount}</div>
              <div class="stat-mini-label">已通过</div>
            </div>
            <div class="stat-mini">
              <div class="stat-mini-value red">${failedCount}</div>
              <div class="stat-mini-label">失败</div>
            </div>
            <div class="stat-mini">
              <div class="stat-mini-value yellow">${blockedCount}</div>
              <div class="stat-mini-label">阻塞</div>
            </div>
            <div class="stat-mini">
              <div class="stat-mini-value purple">${pendingCount}</div>
              <div class="stat-mini-label">待测试</div>
            </div>
          </div>
        `;

        let subFeatureHtml = '';
        featuresToShow.forEach(f => {
          f.subFeatures.forEach(sf => {
            const progress = getSubFeatureProgress(subVehicle.id, sf.id);
            const sfCases = allSvCases.filter(tc => tc.featureId === sf.id);
            const sfPassed = sfCases.filter(tc => {
              const dr = tc.dimensionResults || {};
              return Object.values(dr).some(r => r.status === 'passed');
            }).length;

            let riskLevel = 'low';
            const sfFailed = sfCases.filter(tc => {
              const dr = tc.dimensionResults || {};
              return Object.values(dr).some(r => r.status === 'failed');
            }).length;
            if (sfFailed > 0 || progress < 30) riskLevel = 'high';
            else if (progress < 70) riskLevel = 'medium';

            // 各维度综合进度统计
            const dimStats = CONFIG.dimensions.map(dim => {
              const caseData = getDimCaseProgress(subVehicle.id, sf.id, dim.key);
              const overall = getDimOverallProgress(subVehicle.id, sf.id, dim.key);
              return { dim, ...caseData, overall };
            });

            subFeatureHtml += `
              <div class="sub-feature-card ${selectedSubFeatureId === sf.id ? 'selected' : ''}" onclick="selectSubFeatureDirect('${sf.id}', '${f.id}')">
                <div class="sub-feature-card-header">
                  <span class="sub-feature-card-name">${sf.name}</span>
                  <span class="sub-feature-card-badge ${riskLevel}">${riskLevel === 'high' ? '高风险' : riskLevel === 'medium' ? '中风险' : '低风险'}</span>
                </div>
                <div class="sub-feature-card-progress">
                  <div class="sub-feature-card-bar">
                    <div class="sub-feature-card-bar-fill ${riskLevel}" style="width:${progress}%"></div>
                  </div>
                  <span class="sub-feature-card-percent">${progress}%</span>
                </div>
                <div class="sub-feature-card-dims">
                  ${dimStats.map(d => `
                    <span class="dim-pill-badge ${d.overall >= 100 ? 'passed' : d.overall > 0 ? 'pending' : ''}">
                      ${d.dim.name.substring(0,2)} ${d.overall}%
                    </span>
                  `).join('')}
                </div>
              </div>
            `;
          });
        });

        container.innerHTML = `<div class="sub-feature-container">
          ${statsHtml}
          <div class="sub-feature-grid">${subFeatureHtml}</div>
        </div>`;
        return;
      }

      // ========== 选中子特性后 - 五维度详情 ==========
      const dims = project.featureDimensions || {};
      const dimKey = `${subVehicle.id}-${selectedSubFeatureId}`;
      const featureDimData = dims[dimKey] || {};

      let dimHtml = '';
      CONFIG.dimensions.forEach((dim, idx) => {
        const caseData = getDimCaseProgress(selectedSubVehicleId, selectedSubFeatureId, dim.key);
        const dimData = featureDimData[dim.key] || { manualProgress: 0, manualText: '' };
        const progress = getDimOverallProgress(selectedSubVehicleId, selectedSubFeatureId, dim.key);

        const circumference = 2 * Math.PI * 20;
        const dashArray = (progress / 100) * circumference;

        dimHtml += `
          <div class="dim-card dim-${dim.key} ${selectedDimensionKey === dim.key ? 'selected' : ''}" onclick="selectDimension('${dim.key}')">
            <div class="dim-card-header">
              <div class="dim-card-title">
                <div class="dim-card-icon">${dim.index}</div>
                <span class="dim-card-name">${dim.name}</span>
              </div>
              <span class="dim-card-type ${dim.type === 'auto' ? 'auto' : 'manual'}">${dim.type === 'auto' ? '自动' : '手动'}</span>
            </div>
            <div class="dim-card-progress-ring">
              <svg class="dim-card-ring" viewBox="0 0 52 52">
                <circle class="ring-bg" cx="26" cy="26" r="20" />
                <circle class="ring-fill" cx="26" cy="26" r="20"
                  stroke-dasharray="${dashArray} ${circumference}"
                  transform="rotate(-90 26 26)" />
              </svg>
              <div>
                <div class="dim-card-percent">${progress}%</div>
                <div class="dim-card-percent-label">综合进度</div>
              </div>
            </div>
            <div class="dim-card-bars">
              <div class="dim-card-bar-row">
                <span class="dim-card-bar-label">用例</span>
                <div class="dim-card-bar"><div class="dim-card-bar-fill case" style="width:${caseData.progress}%"></div></div>
                <span class="dim-card-bar-value">${caseData.passed}/${caseData.total}</span>
              </div>
              <div class="dim-card-bar-row">
                <span class="dim-card-bar-label">手工</span>
                <div class="dim-card-bar"><div class="dim-card-bar-fill manual" style="width:${dimData.manualProgress}%"></div></div>
                <span class="dim-card-bar-value">${dimData.manualProgress}%</span>
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = `
        <div class="dimensions-panel">
          <div class="dimension-section">
            <div class="section-label">五维度测试进度 — ${vehicle.name} ${subVehicle.name} / ${getSubFeatureName(selectedSubFeatureId)}</div>
            <div class="dimension-grid">
              ${dimHtml}
            </div>
          </div>
        </div>
        ${selectedDimensionKey ? renderDimensionDetail() : renderTestPanel()}
      `;
    }

    // ========== 选择维度 ==========
    function selectDimension(dimKey) {
      selectedDimensionKey = dimKey;
      filterStatus = 'all';
      filterAssignee = 'all';
      filterPriority = 'all';
      searchText = '';
      renderContent();
    }

    function closeDimensionDetail() {
      selectedDimensionKey = null;
      renderContent();
    }

    // ========== 渲染维度详情面板 ==========
    function renderDimensionDetail() {
      const dim = CONFIG.dimensions.find(d => d.key === selectedDimensionKey);
      if (!dim) return '';

      const result = getSubVehicle(selectedSubVehicleId);
      if (!result) return '';
      const { subVehicle, vehicle } = result;

      const featureDims = projectData[currentProjectId].featureDimensions || {};
      const key = `${selectedSubVehicleId}-${selectedSubFeatureId}`;
      const dimData = (featureDims[key] && featureDims[key][selectedDimensionKey]) || { manualProgress: 0, manualText: '' };

      const caseData = getDimCaseProgress(selectedSubVehicleId, selectedSubFeatureId, selectedDimensionKey);
      const overall = getDimOverallProgress(selectedSubVehicleId, selectedSubFeatureId, selectedDimensionKey);

      return `
        <div class="test-panel dimension-detail-panel">
          <div class="section-header">
            <h3 class="section-title">${dim.name}</h3>
            <button class="btn btn-ghost" onclick="closeDimensionDetail()">返回用例</button>
          </div>

          <div class="dim-detail-cards">
            <div class="dim-detail-card case">
              <div class="dim-detail-card-header">
                <span class="dim-detail-card-title">用例执行进度</span>
                <span class="dim-detail-card-value blue" id="dimDetailCaseValue">${caseData.progress}%</span>
              </div>
              <div class="dim-detail-bar">
                <div class="dim-detail-bar-fill blue" style="width:${caseData.progress}%"></div>
              </div>
              <div class="dim-detail-info">
                <span>通过 / 总用例</span>
                <span>${caseData.passed} / ${caseData.total}</span>
              </div>
            </div>

            <div class="dim-detail-card manual">
              <div class="dim-detail-card-header">
                <span class="dim-detail-card-title">手工任务进度</span>
                <span class="dim-detail-card-value purple" id="dimDetailManualValue">${dimData.manualProgress}%</span>
              </div>
              <div class="dim-detail-bar">
                <div class="dim-detail-bar-fill purple" id="dimDetailManualBar" style="width:${dimData.manualProgress}%"></div>
              </div>
              <div class="dim-detail-slider">
                <input type="range" class="progress-slider" id="dimDetailManualSlider" min="0" max="100" value="${dimData.manualProgress}" oninput="updateDimDetailManual(this.value)">
              </div>
            </div>

            <div class="dim-detail-card overall">
              <div class="dim-detail-card-header">
                <span class="dim-detail-card-title">综合进度</span>
                <span class="dim-detail-card-value purple" id="dimDetailOverallValue">${overall}%</span>
              </div>
              <div class="dim-detail-bar">
                <div class="dim-detail-bar-fill purple" id="dimDetailOverallBar" style="width:${overall}%"></div>
              </div>
              <div class="dim-detail-formula">综合 = 用例进度 × 50% + 手工进度 × 50%</div>
            </div>
          </div>

          <div class="dim-detail-remark">
            <div class="dim-detail-remark-label">手工任务说明</div>
            <textarea class="form-textarea" id="dimDetailRemark" placeholder="填写手工任务进展说明..." onchange="saveDimDetailRemark(this.value)">${dimData.manualText || ''}</textarea>
          </div>

          <div class="dim-detail-actions">
            <button class="btn btn-primary" onclick="saveDimDetailProgress()">保存</button>
            <button class="btn btn-ghost" onclick="closeDimensionDetail()">取消</button>
          </div>
        </div>
      `;
    }

    function updateDimDetailManual(val) {
      const manualBar = document.getElementById('dimDetailManualBar');
      const manualValue = document.getElementById('dimDetailManualValue');
      if (manualBar) manualBar.style.width = val + '%';
      if (manualValue) manualValue.textContent = val + '%';

      // Update overall
      const caseValueEl = document.getElementById('dimDetailCaseValue');
      const caseProgress = caseValueEl ? parseInt(caseValueEl.textContent) || 0 : 0;
      const overall = Math.round(caseProgress * 0.5 + parseInt(val) * 0.5);

      const overallBar = document.getElementById('dimDetailOverallBar');
      const overallValue = document.getElementById('dimDetailOverallValue');
      if (overallBar) overallBar.style.width = overall + '%';
      if (overallValue) overallValue.textContent = overall + '%';
    }

    function saveDimDetailRemark(text) {
      // Will be saved when saveDimDetailProgress is called
    }

    function saveDimDetailProgress() {
      const manualProgress = parseInt(document.getElementById('dimDetailManualSlider').value) || 0;
      const manualText = document.getElementById('dimDetailRemark').value.trim();

      const project = projectData[currentProjectId];
      if (!project) return;

      if (!project.featureDimensions) {
        project.featureDimensions = {};
      }

      const key = `${selectedSubVehicleId}-${selectedSubFeatureId}`;
      if (!project.featureDimensions[key]) {
        project.featureDimensions[key] = {};
      }

      project.featureDimensions[key][selectedDimensionKey] = { manualProgress, manualText };

      saveData();
      selectedDimensionKey = null;
      renderRiskCards();
      renderRiskSummary();
      renderContent();
    }

    // ========== 渲染测试用例面板 ==========
    function renderTestPanel() {
      const result = getSubVehicle(selectedSubVehicleId);
      if (!result) return '';
      const { subVehicle, vehicle } = result;

      let filteredCases = testCases.filter(tc => tc.subVehicleId === selectedSubVehicleId && tc.featureId === selectedSubFeatureId);

      if (filterStatus !== 'all') {
        filteredCases = filteredCases.filter(tc => {
          if (filterStatus === 'pending') {
            return !tc.dimensionResults || Object.values(tc.dimensionResults).every(r => !r.status);
          }
          return tc.dimensionResults && Object.values(tc.dimensionResults).some(r => r.status === filterStatus);
        });
      }
      if (filterPriority !== 'all') {
        filteredCases = filteredCases.filter(tc => tc.priority === filterPriority);
      }
      if (searchText) {
        const search = searchText.toLowerCase();
        filteredCases = filteredCases.filter(tc => tc.title.toLowerCase().includes(search));
      }

      // 使用 caseProgressData 计算统计数据
      const caseStats = getCaseStatsForSubFeature(selectedSubVehicleId, selectedSubFeatureId);
      const total = caseStats.total;
      const passedCount = caseStats.passed;
      const pendingCount = total - passedCount;
      const failedCount = 0;
      const blockedCount = 0;

      // 显示各维度用例详情
      const dimCaseDetails = CONFIG.dimensions.map(dim => {
        const key = `${selectedSubVehicleId}-${selectedSubFeatureId}-${dim.key}`;
        const data = caseProgressData[key] || { passed: 0, total: 0 };
        const progress = data.total > 0 ? Math.round((data.passed / data.total) * 100) : 0;
        return { dim, ...data, progress };
      });

      tableHtml = `
        <div class="dim-case-summary">
          <div class="dim-case-summary-header">
            <span>维度</span>
            <span>通过/总数</span>
            <span>进度</span>
          </div>
          ${dimCaseDetails.map(d => `
            <div class="dim-case-summary-row">
              <span class="dim-name">${d.dim.name}</span>
              <span class="dim-cases">${d.passed} / ${d.total}</span>
              <span class="dim-progress ${d.progress >= 100 ? 'completed' : d.progress > 0 ? 'active' : ''}">${d.progress}%</span>
            </div>
          `).join('')}
        </div>
        <div class="csv-hint">用例数据来自CSV导入，点击左侧维度查看详情</div>
      `;

      return `
        <div class="test-panel">
          <div class="stats-mini">
            <div class="stat-mini">
              <div class="stat-mini-value">${total}</div>
              <div class="stat-mini-label">用例总数</div>
            </div>
            <div class="stat-mini">
              <div class="stat-mini-value green">${passedCount}</div>
              <div class="stat-mini-label">已通过</div>
            </div>
            <div class="stat-mini">
              <div class="stat-mini-value red">${failedCount}</div>
              <div class="stat-mini-label">失败</div>
            </div>
            <div class="stat-mini">
              <div class="stat-mini-value yellow">${blockedCount}</div>
              <div class="stat-mini-label">阻塞</div>
            </div>
            <div class="stat-mini">
              <div class="stat-mini-value purple">${pendingCount}</div>
              <div class="stat-mini-label">待测试</div>
            </div>
          </div>
          <div class="test-section">
            <div class="section-header">
              <h3 class="section-title">测试用例</h3>
              <div class="section-actions">
                <button class="btn btn-success" onclick="exportCases()">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  导出
                </button>
                <button class="btn btn-primary" onclick="openModal()">+ 新增用例</button>
              </div>
            </div>
            ${tableHtml}
          </div>
        </div>
      `;
    }

    // ========== 筛选函数 ==========
    function setFilterStatus(status) {
      filterStatus = status;
      renderContent();
    }

    function setFilterPriority(priority) {
      filterPriority = priority;
      renderContent();
    }

    function setSearchText(text) {
      searchText = text;
      renderContent();
    }

    // ========== 导出 ==========
    function exportCases() {
      let exportData = testCases.filter(tc => tc.subVehicleId === selectedSubVehicleId && tc.featureId === selectedSubFeatureId);

      if (filterStatus !== 'all') {
        exportData = exportData.filter(tc => {
          if (filterStatus === 'pending') {
            return !tc.dimensionResults || Object.values(tc.dimensionResults).every(r => !r.status);
          }
          return tc.dimensionResults && Object.values(tc.dimensionResults).some(r => r.status === filterStatus);
        });
      }
      if (filterPriority !== 'all') {
        exportData = exportData.filter(tc => tc.priority === filterPriority);
      }
      if (searchText) {
        const search = searchText.toLowerCase();
        exportData = exportData.filter(tc => tc.title.toLowerCase().includes(search));
      }

      const headers = ['序号', '用例标题', '优先级', '备注'];
      const priorityMap = { high: '高', medium: '中', low: '低' };

      let csv = headers.join(',') + '\n';
      exportData.forEach((tc, idx) => {
        const row = [
          idx + 1,
          `"${tc.title}"`,
          priorityMap[tc.priority] || tc.priority,
          `"${tc.remark || ''}"`
        ];
        csv += row.join(',') + '\n';
      });

      const BOM = '\uFEFF';
      const blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      const result = getSubVehicle(selectedSubVehicleId);
      link.download = `${result.vehicle.name}_${result.subVehicle.name}_测试用例_${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
    }

    function quickSwitchSubFeature(subFeatureId, featureId) {
      if (!subFeatureId) {
        // 用户选择了父特性本身，回到父特性视图
        selectFeature(featureId);
        return;
      }
      selectSubFeatureDirect(subFeatureId, featureId);
    }

    function selectSubFeatureDirect(subFeatureId, featureId) {
      selectedSubFeatureId = subFeatureId;
      selectedFeatureId = featureId;
      selectedDimensionKey = null;
      filterStatus = 'all';
      filterAssignee = 'all';
      filterPriority = 'all';
      searchText = '';
      renderTimelineSection();
      renderContent();
    }

    function clearSelectedSubFeature() {
      selectedSubFeatureId = null;
      selectedDimensionKey = null;
      filterStatus = 'all';
      filterAssignee = 'all';
      filterPriority = 'all';
      searchText = '';
      renderTimelineSection();
      renderContent();
    }

    function getSubFeatureName(featureId) {
      if (!selectedSubVehicleId) return '';
      const features = getFeaturesForSubVehicle(selectedSubVehicleId);
      for (const f of features) {
        const sf = f.subFeatures.find(s => s.id === featureId);
        if (sf) return sf.name;
      }
      return '';
    }

    // ========== 进度编辑弹窗 ==========
    function openProgressModal(dimensionKey) {
      const result = getSubVehicle(selectedSubVehicleId);
      if (!result) return;

      const dim = CONFIG.dimensions.find(d => d.key === dimensionKey);
      const project = projectData[currentProjectId];
      const featureDims = project.featureDimensions || {};
      const key = `${selectedSubVehicleId}-${selectedSubFeatureId}`;
      const dimData = (featureDims[key] && featureDims[key][dimensionKey]) || { manualProgress: 0, manualText: '' };

      document.getElementById('progressModalTitle').textContent = `编辑「${dim.name}」进度`;
      document.getElementById('editProgressSubVehicle').value = selectedSubVehicleId;
      document.getElementById('editProgressSubFeature').value = selectedSubFeatureId;
      document.getElementById('editProgressDimension').value = dimensionKey;

      // 用例统计信息
      const caseData = getDimCaseProgress(selectedSubVehicleId, selectedSubFeatureId, dimensionKey);
      document.getElementById('caseProgressValue').textContent = caseData.progress + '%';
      document.getElementById('caseProgressBar').style.width = caseData.progress + '%';
      document.getElementById('caseCases').textContent = `${caseData.passed} / ${caseData.total}`;

      // 手工进度
      document.getElementById('manualProgressSlider').value = dimData.manualProgress || 0;
      document.getElementById('manualProgressValue').textContent = (dimData.manualProgress || 0) + '%';
      document.getElementById('manualProgressBar').style.width = (dimData.manualProgress || 0) + '%';
      document.getElementById('manualRemark').value = dimData.manualText || '';

      // 综合进度
      const overall = getDimOverallProgress(selectedSubVehicleId, selectedSubFeatureId, dimensionKey);
      document.getElementById('overallProgressValue').textContent = overall + '%';
      document.getElementById('overallProgressBar').style.width = overall + '%';

      document.getElementById('progressModalOverlay').classList.add('active');
    }

    function closeProgressModal() {
      document.getElementById('progressModalOverlay').classList.remove('active');
    }

    function updateManualProgress(val) {
      document.getElementById('manualProgressValue').textContent = val + '%';
      document.getElementById('manualProgressBar').style.width = val + '%';
      const caseProgress = parseInt(document.getElementById('caseProgressValue').textContent) || 0;
      const overall = Math.round(caseProgress * 0.5 + parseInt(val) * 0.5);
      document.getElementById('overallProgressValue').textContent = overall + '%';
      document.getElementById('overallProgressBar').style.width = overall + '%';
    }

    function saveProgress() {
      const subVehicleId = document.getElementById('editProgressSubVehicle').value;
      const subFeatureId = document.getElementById('editProgressSubFeature').value;
      const dimensionKey = document.getElementById('editProgressDimension').value;
      const manualProgress = parseInt(document.getElementById('manualProgressSlider').value) || 0;
      const manualText = document.getElementById('manualRemark').value.trim();

      const project = projectData[currentProjectId];
      if (!project) return;

      if (!project.featureDimensions) {
        project.featureDimensions = {};
      }

      const key = `${subVehicleId}-${subFeatureId}`;
      if (!project.featureDimensions[key]) {
        project.featureDimensions[key] = {};
      }

      project.featureDimensions[key][dimensionKey] = { manualProgress, manualText };

      saveData();
      renderRiskCards();
      renderRiskSummary();
      renderContent();
      closeProgressModal();
    }

    // ========== 事件监听 ==========
    function setupEventListeners() {
      document.getElementById('testFeature').addEventListener('change', function() {
        updateSubFeatureSelect(this.value);
      });

      document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
      });

      document.getElementById('progressModalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeProgressModal();
      });

      document.getElementById('manualProgressSlider').addEventListener('input', function() {
        updateManualProgress(this.value);
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          closeModal();
          closeProgressModal();
        }
      });
    }

    // ========== 表单函数 ==========
    function updateFeatureSelect() {
      const select = document.getElementById('testFeature');
      if (!selectedSubVehicleId) {
        select.innerHTML = '<option value="">先选车型</option>';
        select.disabled = true;
        return;
      }

      const features = getFeaturesForSubVehicle(selectedSubVehicleId);
      let options = '<option value="">选择特性</option>';
      features.forEach(f => {
        options += `<option value="${f.id}">${f.name}</option>`;
      });
      select.innerHTML = options;
      select.disabled = false;
    }

    function updateSubFeatureSelect(featureId) {
      const select = document.getElementById('testSubFeature');
      if (!selectedSubVehicleId) {
        select.innerHTML = '<option value="">先选车型</option>';
        select.disabled = true;
        return;
      }

      const features = getFeaturesForSubVehicle(selectedSubVehicleId);
      const feature = features.find(f => f.id === featureId);
      if (!feature) {
        select.innerHTML = '<option value="">先选特性</option>';
        select.disabled = true;
        return;
      }

      let options = '<option value="">选择子特性</option>';
      feature.subFeatures.forEach(sf => {
        options += `<option value="${sf.id}">${sf.name}</option>`;
      });
      select.innerHTML = options;
      select.disabled = false;
    }

    function openModal(editId = null) {
      const title = document.getElementById('modalTitle');
      const form = document.getElementById('testForm');

      form.reset();
      document.getElementById('editId').value = '';
      updateFeatureSelect();

      if (editId) {
        const tc = testCases.find(t => t.id === editId);
        if (tc) {
          title.textContent = '编辑测试用例';
          document.getElementById('editId').value = tc.id;
          document.getElementById('testTitle').value = tc.title;

          const features = getFeaturesForSubVehicle(selectedSubVehicleId);
          let parentFeatureId = null;
          for (const f of features) {
            if (f.subFeatures.some(sf => sf.id === tc.featureId)) {
              parentFeatureId = f.id;
              break;
            }
          }

          document.getElementById('testFeature').value = parentFeatureId || '';
          updateSubFeatureSelect(parentFeatureId || '');
          document.getElementById('testSubFeature').value = tc.featureId;
          document.getElementById('testPriority').value = tc.priority;
          document.getElementById('testRemark').value = tc.remark || '';
        }
      } else {
        title.textContent = '新增测试用例';
      }

      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    function saveTestCase() {
      const title = document.getElementById('testTitle').value.trim();
      const featureId = document.getElementById('testSubFeature').value;
      const priority = document.getElementById('testPriority').value;
      const remark = document.getElementById('testRemark').value.trim();
      const editId = document.getElementById('editId').value;

      if (!title || !featureId || !priority) {
        alert('请填写必填项');
        return;
      }

      if (!selectedSubVehicleId) {
        alert('请先选择一个车型');
        return;
      }

      // 初始化 dimensionResults（5个维度）
      const defaultDimensionResults = {};
      CONFIG.dimensions.forEach(dim => {
        defaultDimensionResults[dim.key] = { status: null, assignee: null, date: null };
      });

      if (editId) {
        const index = testCases.findIndex(t => t.id === parseInt(editId));
        if (index !== -1) {
          testCases[index] = {
            ...testCases[index],
            title, featureId, priority, remark
          };
        }
      } else {
        const maxId = testCases.length > 0 ? Math.max(...testCases.map(t => t.id)) : 0;
        testCases.push({
          id: maxId + 1,
          title,
          featureId,
          priority,
          remark,
          subVehicleId: selectedSubVehicleId,
          dimensionResults: JSON.parse(JSON.stringify(defaultDimensionResults))
        });
      }

      projectData[currentProjectId].testCases = testCases;
      saveData();
      loadProject();
      closeModal();
    }

    function editTestCase(id) {
      openModal(id);
    }

    // ========== 启动 ==========
    init();
  </script>
</body>
</html>
